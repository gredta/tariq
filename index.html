<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery with Search and Filter</title>
    <style>
        /* Add your CSS styles here */
        /* You can style the search and filter components as needed */
        .image-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Image Gallery with Search and Filter</h1>

    <!-- Filter by keyword -->
    <label for="keywordFilter">Filter by Keyword:</label>
    <input type="text" id="keywordFilter" placeholder="global, pastel, etc.">

    <!-- Earliest known example -->
    <label for="earliestKnownExample">Earliest Known Example:</label>
    <select id="earliestKnownExample">
        <option value="between">Between</option>
        <option value="before">Before</option>
        <option value="after">After</option>
    </select>
    <input type="number" id="earliestKnownExampleStart" placeholder="Start Year">
    <input type="number" id="earliestKnownExampleEnd" placeholder="End Year">

    <!-- End of popularity -->
    <label for="endOfPopularity">End of Popularity:</label>
    <select id="endOfPopularity">
        <option value="between">Between</option>
        <option value="before">Before</option>
        <option value="after">After</option>
    </select>
    <input type="number" id="endOfPopularityStart" placeholder="Start Year">
    <input type="number" id="endOfPopularityEnd" placeholder="End Year">

    <!-- Relevant Decade -->
    <label for="relevantDecade">Relevant Decade:</label>
    <select id="relevantDecade">
        <option value="1960s">1960s</option>
        <option value="1970s">1970s</option>
        <option value="1980s">1980s</option>
        <option value="1990s">1990s</option>
        <option value="2000s">2000s</option>
        <option value="2010s">2010s</option>
        <option value="2020s">2020s</option>
        <!-- Add more decades as needed -->
    </select>

    <!-- Sort and Order options -->
    <label for="sortOrder">Sort by:</label>
    <select id="sortOrder">
        <option value="nameAZ">Name (A-Z)</option>
        <option value="nameZA">Name (Z-A)</option>
        <!-- Add more sorting options as needed -->
    </select>

    <label for="order">Order:</label>
    <select id="order">
        <option value="asc">A-Z</option>
        <option value="desc">Z-A</option>
    </select>

    <!-- Search button -->
    <button id="searchButton">Search</button>

    <!-- Reset and Clear buttons -->
    <button id="resetFilters">Reset Filters</button>
    <button id="clearFilters">Clear Filters</button>

    <!-- Image Gallery -->
    <div class="image-gallery" id="imageGallery">
        <!-- Placeholder images will be displayed here -->
        <!-- Replace these placeholders with actual image URLs -->
        <img class="image" data-taxonomy="landscape" data-earliest="2000" data-endpopularity="2010" data-decade="2000s" src="placeholder1.jpg" alt="Image 1">
        <img class="image" data-taxonomy="portrait" data-earliest="1995" data-endpopularity="2005" data-decade="1990s" src="placeholder2.jpg" alt="Image 2">
        <!-- Add more images with appropriate data attributes -->
    </div>

    <script>
        // JavaScript for handling search and filter logic
        const keywordFilter = document.getElementById("keywordFilter");
        const earliestKnownExample = document.getElementById("earliestKnownExample");
        const earliestKnownExampleStart = document.getElementById("earliestKnownExampleStart");
        const earliestKnownExampleEnd = document.getElementById("earliestKnownExampleEnd");
        const endOfPopularity = document.getElementById("endOfPopularity");
        const endOfPopularityStart = document.getElementById("endOfPopularityStart");
        const endOfPopularityEnd = document.getElementById("endOfPopularityEnd");
        const relevantDecade = document.getElementById("relevantDecade");
        const sortOrder = document.getElementById("sortOrder");
        const order = document.getElementById("order");
        const searchButton = document.getElementById("searchButton");
        const resetFilters = document.getElementById("resetFilters");
        const clearFilters = document.getElementById("clearFilters");
        const imageGallery = document.getElementById("imageGallery");

        // Add event listeners for reset, clear filters, and search
        resetFilters.addEventListener("click", resetFiltersHandler);
        clearFilters.addEventListener("click", clearFiltersHandler);
        searchButton.addEventListener("click", searchHandler);

        function resetFiltersHandler() {
            // Clear all filter fields and reset the gallery
            keywordFilter.value = "";
            earliestKnownExample.value = "between";
            earliestKnownExampleStart.value = "";
            earliestKnownExampleEnd.value = "";
            endOfPopularity.value = "between";
            endOfPopularityStart.value = "";
            endOfPopularityEnd.value = "";
            relevantDecade.value = "";
            sortOrder.value = "nameAZ";
            order.value = "asc";
            searchHandler();
        }

        function clearFiltersHandler() {
            // Clear all filter fields, except for the keyword filter
            earliestKnownExample.value = "between";
            earliestKnownExampleStart.value = "";
            earliestKnownExampleEnd.value = "";
            endOfPopularity.value = "between";
            endOfPopularityStart.value = "";
            endOfPopularityEnd.value = "";
            relevantDecade.value = "";
            sortOrder.value = "nameAZ";
            order.value = "asc";
            searchHandler();
        }

        function searchHandler() {
            const keyword = keywordFilter.value.toLowerCase();
            const earliestExampleType = earliestKnownExample.value;
            const earliestStart = parseInt(earliestKnownExampleStart.value);
            const earliestEnd = parseInt(earliestKnownExampleEnd.value);
            const endPopularityType = endOfPopularity.value;
            const endStart = parseInt(endOfPopularityStart.value);
            const endEnd = parseInt(endOfPopularityEnd.value);
            const selectedDecade = relevantDecade.value;
            const selectedSortOrder = sortOrder.value;
            const selectedOrder = order.value;

            // Get all the images in the gallery
            const images = imageGallery.querySelectorAll(".image");

            // Loop through each image to apply filters
            images.forEach(image => {
                const imageName = image.alt.toLowerCase();

                // Check if the image matches the selected filters
                const isKeywordMatch = imageName.includes(keyword);
                const isEarliestExampleMatch = checkYearRange(image.getAttribute("data-earliest"), earliestExampleType, earliestStart, earliestEnd);
                const isEndOfPopularityMatch = checkYearRange(image.getAttribute("data-endpopularity"), endPopularityType, endStart, endEnd);
                const isDecadeMatch = selectedDecade === "" || image.getAttribute("data-decade") === selectedDecade;

                // Show/hide the image based on filter results
                if (isKeywordMatch && isEarliestExampleMatch && isEndOfPopularityMatch && isDecadeMatch) {
                    image.style.display = "block";
                } else {
                    image.style.display = "none";
                }
            });

            // Sort the displayed images
            const sortedImages = Array.from(images).filter(image => image.style.display !== "none");

            sortedImages.sort((a, b) => {
                const aName = a.getAttribute("alt").toLowerCase();
                const bName = b.getAttribute("alt").toLowerCase();

                if (selectedSortOrder === "nameAZ") {
                    return aName.localeCompare(bName);
                } else {
                    return bName.localeCompare(aName);
                }
            });

            imageGallery.innerHTML = '';
            sortedImages.forEach(image => imageGallery.appendChild(image));
        }

        function checkYearRange(imageYear, rangeType, startYear, endYear) {
            if (isNaN(imageYear) || isNaN(startYear) || isNaN(endYear)) {
                return true;
            }

            if (rangeType === "before") {
                return imageYear < startYear;
            } else if (rangeType === "after") {
                return imageYear > startYear;
            } else {
                return imageYear >= startYear && imageYear <= endYear;
            }
        }
    </script>
</body>
</html>
